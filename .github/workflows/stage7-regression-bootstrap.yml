name: Stage 7 one-time regression bootstrap

on:
  pull_request:
    branches:
      - main
    paths:
      - ".stage7/regression-fixes.patch"
      - ".github/workflows/stage7-regression-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-regression-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply and compile
        id: apply
        run: |
          set -euo pipefail
          git apply --check --recount --verbose .stage7/regression-fixes.patch
          git apply --recount --verbose .stage7/regression-fixes.patch
          python -m py_compile tkr/literary_query.py tests/test_literary_engine.py

      - name: Commit corrected regression
        if: steps.apply.outcome == 'success'
        run: |
          set -euo pipefail
          rm -rf .stage7 .github/workflows/stage7-regression-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(stage7): correct chapter fixture and event-name retrieval"
          git push origin "HEAD:${{ github.head_ref }}"
