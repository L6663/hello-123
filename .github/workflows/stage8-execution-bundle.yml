name: Stage 8 R3 Reconcile Status

on:
  pull_request:
    branches:
      - develop/v6-literary-engine

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  reconcile-status:
    if: github.event.pull_request.head.ref == 'chore/v6-stage8-r3-status-reconciliation' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact status reconciliation
        run: |
          set -euo pipefail
          base64 --decode .github/stage8-r3-status.patch.gz.b64 \
            | gzip --decompress > /tmp/stage8-r3-status.patch
          git apply --check /tmp/stage8-r3-status.patch
          git apply /tmp/stage8-r3-status.patch

      - name: Validate status and repository
        run: |
          python - <<'PY'
          from pathlib import Path

          text = Path('PROJECT_STATUS.yaml').read_text(encoding='utf-8')
          required = [
              'schema_version: tkr-project-status-v19',
              'status: semantic_precision_integrated_untouched_final_corpus_pending',
              'current_stage_status: r3_integrated_untouched_final_corpus_pending',
              'final_pr_head: afc4eb732dfc749662697d3e472cce0689239ae9',
              'productization_workflow_run_id: 30008764189',
              'private_artifact_guard_workflow_run_id: 30008764182',
              'execution_bundle_workflow_run_id: 30008764248',
              'squash_merge_commit: 9e4e8e830ba05ba4a3693b6d427d30f85132f4e9',
              'final_acceptance_corpus_used_for_v6_development: false',
              'technical_acceptance_candidate_created: false',
              'may_accept_project: false',
              'may_release: false',
              'may_freeze: false',
          ]
          missing = [item for item in required if item not in text]
          assert not missing, missing
          PY
          python -m unittest discover -s tests -p 'test_*.py'
          python tkr/private_artifact_guard.py --root . --output /tmp/private-guard.json

      - name: Commit status reconciliation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add PROJECT_STATUS.yaml
          if git diff --cached --quiet; then
            echo 'Status reconciliation already present.'
            exit 0
          fi
          git commit -m 'status: record integrated Stage 8-R3'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
