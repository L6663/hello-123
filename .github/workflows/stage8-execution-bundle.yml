name: Stage 8 Execution Bundle

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  SOURCE_DATE_EPOCH: "1700000000"

jobs:
  build-execution-bundle:
    name: Build public execution bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply reviewed exact-newline fixes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/v6-stage8-r2-execution-bundle' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          python - <<'PY'
          from pathlib import Path

          for name in ('tkr/chapter_project.py', 'tkr/evidence_project.py'):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              old = '        source_text = source_path.read_text(encoding="utf-8")\n'
              new = (
                  '        # Preserve stored CRLF/LF bytes after strict UTF-8 decoding.\n'
                  '        # Universal-newline translation would invalidate source hashes and offsets.\n'
                  '        with source_path.open("r", encoding="utf-8", newline="") as handle:\n'
                  '            source_text = handle.read()\n'
              )
              if old in text:
                  path.write_text(text.replace(old, new, 1), encoding='utf-8')
              elif new not in text:
                  raise SystemExit(f'{name} no longer matches reviewed patch target')
          PY
          python -m py_compile tkr/chapter_project.py tkr/evidence_project.py tests/test_exact_source_newlines.py
          python -m unittest tests.test_exact_source_newlines tests.test_chapter_project tests.test_evidence_project -v

      - name: Commit reviewed exact-newline fixes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'feature/v6-stage8-r2-execution-bundle' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tkr/chapter_project.py tkr/evidence_project.py
          if git diff --cached --quiet; then
            echo 'Reviewed exact-newline fixes already present.'
          else
            git commit -m 'fix: preserve project source newline bindings'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build canonical Wheel
        run: python -m build --wheel --outdir dist

      - name: Assemble public-only execution bundle
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p execution-bundle/source execution-bundle/wheel
          rsync -a ./ execution-bundle/source/ \
            --exclude '.git/' \
            --exclude '.venv/' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude 'build/' \
            --exclude 'dist/' \
            --exclude 'execution-bundle/' \
            --exclude '.tkr-private-acceptance/' \
            --exclude 'private-acceptance/' \
            --exclude 'private-corpus/' \
            --exclude 'private-gold/' \
            --exclude 'private-observations/' \
            --exclude '步剑庭*.txt' \
            --exclude '步剑庭*.zip'
          cp dist/*.whl execution-bundle/wheel/
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path('execution-bundle')
          wheel = next((root / 'wheel').glob('*.whl'))
          metadata = {
              'schema_version': 'tkr-public-execution-bundle-v1',
              'source_commit': os.environ['SOURCE_COMMIT'],
              'source_date_epoch': int(os.environ['SOURCE_DATE_EPOCH']),
              'wheel_name': wheel.name,
              'wheel_sha256': hashlib.sha256(wheel.read_bytes()).hexdigest(),
              'contains_private_artifacts': False,
              'project_acceptance_performed': False,
              'release_candidate': False,
              'may_release': False,
              'may_freeze': False,
          }
          (root / 'execution-bundle.json').write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Verify private artifacts are absent
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from tkr.private_artifact_guard import scan_paths

          source_root = Path('execution-bundle/source')
          paths = [
              path.relative_to(source_root).as_posix()
              for path in source_root.rglob('*')
              if path.is_file()
          ]
          report = scan_paths(paths)
          output = Path('execution-bundle/private-artifact-guard.json')
          output.write_text(
              json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          assert report['passed'] is True
          assert report['finding_count'] == 0
          assert report['project_acceptance_performed'] is False
          assert report['may_release'] is False
          assert report['may_freeze'] is False
          PY

      - name: Upload public execution bundle
        uses: actions/upload-artifact@v4
        with:
          name: stage8-public-execution-bundle
          path: execution-bundle/
          if-no-files-found: error
          retention-days: 7
