name: Stage 8 R3 Apply Reviewed Patch

on:
  pull_request:
    branches:
      - develop/v6-literary-engine

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  apply-reviewed-r3-patch:
    if: github.event.pull_request.head.ref == 'feature/v6-stage8-r3-semantic-precision' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply exact reviewed R3 patch
        run: |
          set -euo pipefail
          cat .github/r3-patch/part-00.b64 \
              .github/r3-patch/part-01.b64 \
              .github/r3-patch/part-02.b64 \
              .github/r3-patch/part-03.b64 \
              | base64 --decode | gzip --decompress > /tmp/stage8-r3.patch
          git apply --check /tmp/stage8-r3.patch
          git apply /tmp/stage8-r3.patch

      - name: Validate focused R3 regressions
        run: |
          python -m py_compile \
            tkr/semantic_rules.py \
            tkr/claim_validation.py \
            tkr/entity_normalization.py \
            tkr/knowledge_models.py \
            tkr/engineering.py \
            tkr/stage6_r1_remediation.py
          python -m unittest \
            tests.test_semantic_precision_r3 \
            tests.test_semantic_subjectless_permission \
            tests.test_entity_ambiguity_fact_blocking \
            tests.test_r3_runtime_identity \
            tests.test_entity_normalization_adversarial \
            tests.test_claim_validation \
            tests.test_claim_validation_adversarial -v

      - name: Validate complete repository
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Reject tracked private artifacts
        run: |
          python - <<'PY'
          import subprocess
          from tkr.private_artifact_guard import scan_paths

          raw = subprocess.check_output(['git', 'ls-files', '-z'])
          paths = [item.decode('utf-8') for item in raw.split(b'\0') if item]
          report = scan_paths(paths)
          assert report['passed'] is True, report
          assert report['finding_count'] == 0
          assert report['content_scanned'] is False
          assert report['project_acceptance_performed'] is False
          assert report['release_candidate'] is False
          assert report['may_release'] is False
          assert report['may_freeze'] is False
          PY

      - name: Commit reviewed R3 patch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'Reviewed R3 patch already present.'
            exit 0
          fi
          git commit -m 'fix: enforce semantic precision and ambiguity blocking'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
