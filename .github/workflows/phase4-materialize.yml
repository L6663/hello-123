name: phase4-materialize

on:
  push:
    branches:
      - feature/entity-normalization-v5.4-alpha1
    paths:
      - ".github/workflows/phase4-materialize.yml"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/entity-normalization-v5.4-alpha1
          fetch-depth: 0
      - name: Decode and validate staged Phase 4 files
        id: validation
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            cat .phase4-upload/entity/part* | tr -d '\n\r' | base64 -d > tkr/entity_normalization.py
            cat .phase4-upload/tests/part* | tr -d '\n\r' | base64 -d > tests/test_entity_normalization_adversarial.py
            python - <<'PY'
          from pathlib import Path
          import re

          path = Path("tkr/entity_normalization.py")
          text = path.read_text(encoding="utf-8")
          replacement = '''    facts: list[Fact] = []
              for item in accepted:
                  candidate = item.candidate
                  validation = item.validation
                  subject_mention = mention_by_key.get((validation.result_id, "subject"))
                  object_mention = mention_by_key.get((validation.result_id, "object"))
                  normalized = validation.normalized_claim
                  scope = _predicate_scope(item)
                  fact_id = _stable_id(
                      "fac_",
                      NORMALIZER_VERSION,
                      validation.result_id,
                      scope,
                      json.dumps(normalized, ensure_ascii=False, sort_keys=True, separators=(",", ":")),
                  )
                  facts.append(
                      Fact(
                          fact_id=fact_id,
                          claim_result_id=validation.result_id,
                          claim_type=candidate.claim_type,
                          predicate_scope=scope,
                          subject_entity_id=(
                              mention_to_entity[subject_mention.mention_id] if subject_mention is not None else None
                          ),
                          subject=str(normalized.get("subject", "")),
                          object_entity_id=(
                              mention_to_entity[object_mention.mention_id] if object_mention is not None else None
                          ),
                          object=str(normalized.get("object", "")),
                          value=normalized.get("value"),
                          unit=str(normalized.get("unit", "")),
                          polarity=bool(normalized.get("polarity", True)),
                          source_id=candidate.source_id,
                          unit_id=candidate.unit_id,
                          evidence_start=candidate.evidence_start,
                          evidence_end=candidate.evidence_end,
                          evidence_sha256=validation.evidence_sha256,
                          temporal_marker=_temporal_marker(item),
                      )
                  )

              facts.sort(key=lambda item: (item.source_id, item.evidence_start, item.fact_id))
              conflicts = _attach_claim_conflicts(conflicts, facts)
              conflicts.extend(_detect_fact_conflicts(facts))
              conflicts = sorted({item.conflict_id: item for item in conflicts}.values(), key=lambda item: item.conflict_id)

              conflict_by_fact: dict[str, list[Conflict]] = defaultdict(list)
              for conflict in conflicts:
                  for fact_id in conflict.fact_ids:
                      conflict_by_fact[fact_id].append(conflict)
              normalized_facts: list[Fact] = []
              for fact in facts:
                  related = conflict_by_fact.get(fact.fact_id, [])
                  statuses = {item.status for item in related}
                  if "unresolved" in statuses:
                      canonical_status = "contested"
                  elif "resolved_temporal" in statuses:
                      canonical_status = "temporal_variant"
                  elif "resolved_precision" in statuses:
                      canonical_status = "compatible_variant"
                  else:
                      canonical_status = "canonical"
                  normalized_facts.append(
                      replace(
                          fact,
                          canonical_status=canonical_status,
                          conflict_ids=tuple(sorted(item.conflict_id for item in related)),
                      )
                  )

              source_orders: Counter[str] = Counter()
              timeline_rows: list[TimelineEvent] = []
              for fact in normalized_facts:
                  source_orders[fact.source_id] += 1
                  timeline_rows.append(
                      TimelineEvent(
                          event_id=_stable_id("evt_", NORMALIZER_VERSION, fact.fact_id),
                          fact_id=fact.fact_id,
                          source_id=fact.source_id,'''
          pattern = r'    facts: list\{Fact\] = \[\]\s+source_id=fact\.source_id,'
          text, count = re.subn(pattern, replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one staged payload repair, found {count}")
          path.write_text(text, encoding="utf-8")
          PY
            sha256sum tkr/entity_normalization.py tests/test_entity_normalization_adversarial.py
            echo "816f6957735d2f431e113f32106f851df851b78429a4f7ee563bffef9073113c  tkr/entity_normalization.py" | sha256sum -c -
            echo "b4fe014e5e1507449d13ca0dd32e877b5817738114c3b444d0f99e23409d2b52  tests/test_entity_normalization_adversarial.py" | sha256sum -c -
            python -m compileall -q tkr tests
            python -m unittest discover -s tests -v
          } > phase4-materialize.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve materialization log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-materialize-log
          path: phase4-materialize.log
          if-no-files-found: error
      - name: Report materialization result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "### Phase 4 materialization status: ${{ steps.validation.outputs.status }}"
            echo
            echo '```text'
            cat phase4-materialize.log
            echo '```'
          } > phase4-materialize-comment.md
          gh pr comment 3 --body-file phase4-materialize-comment.md
      - name: Commit materialized implementation
        if: steps.validation.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/entity_normalization.py tests/test_entity_normalization_adversarial.py
          git rm -r .phase4-upload
          git rm .github/workflows/phase4-materialize.yml
          git commit -m "feat(entities): harden Phase 4 normalization and adversarial tests"
          git push origin HEAD:feature/entity-normalization-v5.4-alpha1
      - name: Enforce materialization gate
        if: always()
        shell: bash
        run: test "${{ steps.validation.outputs.status }}" = "0"
