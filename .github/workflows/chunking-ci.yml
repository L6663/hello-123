name: chunking-ci

on:
  push:
    branches:
      - main
      - feature/chunking-v5.2-alpha1
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Compile sources
        id: compile
        continue-on-error: true
        run: python -m compileall -q tkr tests > compile.log 2>&1
      - name: Run chunking regression and adversarial tests
        id: tests
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        run: python -m unittest discover -s tests -v > tests.log 2>&1
      - name: Preserve validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chunking-validation-python-${{ matrix.python-version }}
          path: |
            compile.log
            tests.log
          if-no-files-found: ignore
      - name: Enforce validation gate
        if: always()
        run: |
          test "${{ steps.compile.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
