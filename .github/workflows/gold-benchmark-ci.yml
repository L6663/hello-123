name: gold-benchmark-ci
on:
  push:
    branches: [feature/gold-benchmark-v5.7-alpha1]
  pull_request:
    paths:
      - "tkr/gold_benchmark.py"
      - "tkr/gold_benchmark_cli.py"
      - "tests/test_gold_benchmark*.py"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/gold-benchmark-ci.yml"
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install .
      - run: python -m compileall -q tkr tests
      - run: python -m unittest discover -s tests -v
