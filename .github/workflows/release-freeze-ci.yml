name: release-freeze-ci
on:
  pull_request:
permissions:
  contents: write
jobs:
  apply-v59:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/full-ingestion-v5.9-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decode and apply verified delta
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v59-delta/*.b64 | base64 -d > /tmp/v59-delta.tar.xz
          test "$(stat -c%s /tmp/v59-delta.tar.xz)" = "70840"
          echo "816876aa5918f9ef701fcc352ac15d00e0dd5091aed2684edb01b7bcfbd6ac50  /tmp/v59-delta.tar.xz" | sha256sum -c -
          tar -xJf /tmp/v59-delta.tar.xz
          rm -rf .github/v59-delta .github/v59-payload
          rm -f .github/v59-delta-trigger.txt
      - name: Compile integrated source
        run: python -m compileall -q tkr tests tools benchmark
      - name: Run integrated tests
        run: python -m unittest discover -s tests -q
      - name: Restore workflow files for connector-managed update
        shell: bash
        run: git checkout HEAD -- .github/workflows
      - name: Commit integrated source and evidence contracts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(v5.9): complete full ingestion and long-corpus validation"
          git push origin HEAD:feature/full-ingestion-v5.9-alpha1
