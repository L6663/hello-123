name: phase8-binding-fixes
on:
  push:
    branches: [feature/release-freeze-v5.8-alpha1]
permissions:
  contents: write
jobs:
  apply:
    if: github.event.head_commit.message != 'fix(phase8): bind benchmark inputs and reproducible wheels'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/release-freeze-v5.8-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python .github/scripts/apply_phase8_binding_fixes.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(phase8): bind benchmark inputs and reproducible wheels"
          git push origin HEAD:feature/release-freeze-v5.8-alpha1
