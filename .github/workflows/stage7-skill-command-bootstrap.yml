name: Stage 7 one-time Skill command bootstrap

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
    paths:
      - ".stage7/skill-command-section.patch"
      - ".github/workflows/stage7-skill-command-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-skill-command-section:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply Skill command section
        id: apply
        run: |
          set -euo pipefail
          git apply --check --recount --verbose .stage7/skill-command-section.patch
          git apply --recount --verbose .stage7/skill-command-section.patch

      - name: Commit Skill compatibility fix
        if: steps.apply.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SKILL.md
          git rm .stage7/skill-command-section.patch .github/workflows/stage7-skill-command-bootstrap.yml
          git commit -m "fix(stage7): preserve Skill command contract"
          git push origin "HEAD:${{ github.head_ref }}"
