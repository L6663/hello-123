name: source-provenance-integration
on:
  push:
    branches:
      - feature/release-freeze-v5.8-alpha1
    paths:
      - .github/source-provenance-trigger.txt
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/release-freeze-v5.8-alpha1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python .github/scripts/apply_source_provenance_integration.py
      - run: python -m compileall -q tkr tests tools
      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/release_freeze.py tools/assemble_freeze_candidate.py tests/test_release_freeze.py
          git commit -m "fix(phase8): bind source commit to wheel runtime" || exit 0
          git push
