name: assembly-checkout-import
on:
  push:
    branches:
      - feature/release-freeze-v5.8-alpha1
    paths:
      - .github/assembly-checkout-trigger.txt
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/release-freeze-v5.8-alpha1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python .github/scripts/patch_assembly_checkout_import.py
      - run: python -m compileall -q tools tkr tests
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/assemble_freeze_candidate.py
          git commit -m "fix(phase8): load candidate verifier from checkout" || exit 0
          git push
