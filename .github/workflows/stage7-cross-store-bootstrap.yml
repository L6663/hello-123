name: Stage 7 one-time cross-store bootstrap

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
    paths:
      - ".stage7/cross-store-verification.patch"
      - ".github/workflows/stage7-cross-store-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-cross-store-verification:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply cross-store verification
        id: apply
        run: |
          set -euo pipefail
          git apply --check --recount --verbose .stage7/cross-store-verification.patch
          git apply --recount --verbose .stage7/cross-store-verification.patch
          python -m py_compile tkr/literary_engine.py

      - name: Commit verifier hardening
        if: steps.apply.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/literary_engine.py
          git rm .stage7/cross-store-verification.patch .github/workflows/stage7-cross-store-bootstrap.yml
          git commit -m "fix(stage7): cross-check literary JSONL and SQLite stores"
          git push origin "HEAD:${{ github.head_ref }}"
