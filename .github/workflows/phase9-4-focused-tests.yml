name: Phase 9.4 focused developer checks

on:
  pull_request:
    branches:
      - feature/phase9-0-baseline-cleanup
    paths:
      - "tkr/anomaly_detection.py"
      - "tkr/anomaly_cli.py"
      - "tests/test_anomaly_detection.py"
      - "pyproject.toml"
      - ".github/workflows/phase9-4-focused-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase9_4_focused:
    name: Phase 9.4 implementation check
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install development package
        run: python -m pip install --no-deps -e .

      - name: Compile Phase 9.4 modules
        run: python -m py_compile tkr/anomaly_detection.py tkr/anomaly_cli.py

      - name: Run Phase 9.4 focused tests
        run: python -m unittest -v tests.test_anomaly_detection

      - name: State non-acceptance boundary
        run: echo "Focused developer checks only; no project acceptance was performed."
