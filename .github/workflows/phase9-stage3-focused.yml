name: Phase 9 Stage 3 focused developer checks

on:
  pull_request:
    branches:
      - feature/phase9-0-baseline-cleanup
    paths:
      - "tkr/semantic_*.py"
      - "tests/test_semantic_extraction.py"
      - "schemas/semantic-*.schema.json"
      - "schemas/model-extraction-task.schema.json"
      - "schemas/accepted-claim-record.schema.json"
      - "pyproject.toml"
      - ".github/workflows/phase9-stage3-focused.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    name: Stage 3 implementation check / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development package
        run: python -m pip install --no-deps -e .
      - name: Compile Stage 3 modules
        run: >-
          python -m py_compile
          tkr/semantic_models.py
          tkr/semantic_model_tasks.py
          tkr/semantic_text.py
          tkr/semantic_rules.py
          tkr/semantic_extraction.py
          tkr/semantic_artifacts.py
          tkr/semantic_cli.py
      - name: Validate Stage 3 JSON Schema syntax
        run: >-
          python -c "import json, pathlib;
          files=['semantic-candidate.schema.json','semantic-finding.schema.json',
          'model-extraction-task.schema.json','accepted-claim-record.schema.json',
          'semantic-report.schema.json'];
          [json.loads((pathlib.Path('schemas')/name).read_text(encoding='utf-8')) for name in files]"
      - name: Run Stage 3 focused tests
        run: python -m unittest -v tests.test_semantic_extraction
      - name: Verify Stage 3 command
        run: tkr-semantic-extract --help > /dev/null
      - name: State non-acceptance boundary
        run: echo "Focused developer checks only; no project acceptance was performed."
