name: Stage 7 one-time foundation bootstrap

on:
  pull_request:
    branches:
      - main
    paths:
      - ".stage7/foundation-fixes.patch"
      - ".github/workflows/stage7-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-foundation-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply verified Stage 7 fixes
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          git apply --check --recount --verbose .stage7/foundation-fixes.patch
          git apply --recount --verbose .stage7/foundation-fixes.patch
          python -m py_compile \
            tkr/literary_models.py \
            tkr/literary_engine.py \
            tkr/literary_query.py \
            tkr/literary_export.py \
            tkr/literary_cli.py

      - name: Commit source fixes
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .stage7 .github/workflows/stage7-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(stage7): enforce exact annotation evidence binding"
          git push origin "HEAD:${{ github.head_ref }}"
