name: phase7-debug
on:
  pull_request:
    paths:
      - ".github/workflows/phase7-debug.yml"
      - "tools/apply_phase7_hardening.py"
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/gold-benchmark-v5.7-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply deterministic hardening rewrite
        run: python tools/apply_phase7_hardening.py
      - run: python -m pip install .
      - run: python -m compileall -q tkr tests
      - run: python -m unittest discover -s tests -v
      - name: Commit hardened evaluator
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/gold_benchmark.py
          git rm .phase7-hardening.patch tools/apply_phase7_hardening.py
          git commit -m "fix(benchmark): harden immutable policy and Gold labels"
          git push origin HEAD:feature/gold-benchmark-v5.7-alpha1
