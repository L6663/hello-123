name: phase7-debug
on:
  push:
    branches: [feature/gold-benchmark-v5.7-alpha1]
    paths: [".github/workflows/phase7-debug.yml"]
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install .
      - name: Capture tests
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > phase7-test.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase7-test-log
          path: phase7-test.log
      - name: Preserve failure status
        run: exit ${{ steps.tests.outputs.exit_code }}
