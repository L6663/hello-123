name: Stage 7 one-time assertion-order bootstrap

on:
  pull_request:
    branches:
      - main
    paths:
      - ".stage7/assertion-order.patch"
      - ".github/workflows/stage7-assertion-order-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-assertion-order:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply two-pass insertion fix
        id: apply
        run: |
          set -euo pipefail
          git apply --check --recount --verbose .stage7/assertion-order.patch
          git apply --recount --verbose .stage7/assertion-order.patch
          python -m py_compile tkr/literary_engine.py

      - name: Commit implementation fix
        if: steps.apply.outcome == 'success'
        run: |
          set -euo pipefail
          rm -rf .stage7 .github/workflows/stage7-assertion-order-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/literary_engine.py
          git rm --ignore-unmatch .stage7/assertion-order.patch .github/workflows/stage7-assertion-order-bootstrap.yml
          git commit -m "fix(stage7): insert assertion supports after assertion rows"
          git push origin "HEAD:${{ github.head_ref }}"
