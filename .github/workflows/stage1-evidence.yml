name: Stage 2 Chapter CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage2-chapter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 2 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply staged source corrections
        id: staged_fix
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .stage2/chapter-project-fixes.patch ]; then
            git apply --check --recount --verbose .stage2/chapter-project-fixes.patch
            git apply --recount --verbose .stage2/chapter-project-fixes.patch
            python -m py_compile tkr/chapter_project.py
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tkr/chapter_project.py
            git rm .stage2/chapter-project-fixes.patch
            rmdir .stage2 2>/dev/null || true
            git commit -m "fix(stage2): correct chapter project SQL and report schema"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/chapter_engine.py \
            tkr/chapter_project.py \
            tkr/chapter_cli.py

      - name: Validate Stage 2 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "chapter-source-binding.schema.json",
              "canonical-chapter.schema.json",
              "chapter-finding.schema.json",
              "canonical-order.schema.json",
              "chapter-project-report.schema.json",
              "chapter-project-verification.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 2 tests
        run: |
          python -m unittest \
            tests.test_chapter_engine \
            tests.test_chapter_project -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-chapter --help >/dev/null
          tkr-chapter build --help >/dev/null
          tkr-chapter verify --help >/dev/null
          tkr-chapter query --help >/dev/null
          python scripts/tkr.py chapter --help >/dev/null
          python scripts/tkr.py chapter-build --help >/dev/null
          python scripts/tkr.py chapter-verify --help >/dev/null
          python scripts/tkr.py chapter-query --help >/dev/null
