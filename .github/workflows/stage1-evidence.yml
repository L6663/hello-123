name: Stage 4 Character CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage4-character-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 4 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply staged Skill contract update
        if: ${{ hashFiles('.stage4/apply_skill_stage4_contract.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python .stage4/apply_skill_stage4_contract.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SKILL.md
          git rm .stage4/apply_skill_stage4_contract.py
          rmdir .stage4 2>/dev/null || true
          git commit -m "docs(stage4): integrate Character Project into Skill contract"
          git push origin "HEAD:${{ github.head_ref }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/character_engine.py \
            tkr/character_project.py \
            tkr/character_cli.py

      - name: Validate Stage 4 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "focused-character.schema.json",
              "character-attribute.schema.json",
              "character-state.schema.json",
              "character-relationship.schema.json",
              "character-event-link.schema.json",
              "character-annotation.schema.json",
              "character-project-report.schema.json",
              "character-project-verification.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 4 tests
        run: |
          python -m unittest \
            tests.test_character_engine \
            tests.test_character_project -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-character --help >/dev/null
          tkr-character build --help >/dev/null
          tkr-character verify --help >/dev/null
          tkr-character query --help >/dev/null
          python scripts/tkr.py character --help >/dev/null
          python scripts/tkr.py character-build --help >/dev/null
          python scripts/tkr.py character-verify --help >/dev/null
          python scripts/tkr.py character-query --help >/dev/null
