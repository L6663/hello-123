name: Stage 5 Reasoning CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage5-reasoning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 5 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply staged Skill reasoning contract
        if: ${{ hashFiles('.stage5/apply_skill_stage5_contract.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python .stage5/apply_skill_stage5_contract.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SKILL.md
          git rm .stage5/apply_skill_stage5_contract.py
          rmdir .stage5 2>/dev/null || true
          git commit -m "docs(stage5): integrate Reasoning Project into Skill contract"
          git push origin "HEAD:${{ github.head_ref }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/reasoning_engine.py \
            tkr/reasoning_project.py \
            tkr/reasoning_cli.py

      - name: Validate Stage 5 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "reasoning-node.schema.json",
              "reasoning-edge.schema.json",
              "reasoning-finding.schema.json",
              "reasoning-annotation.schema.json",
              "reasoning-project-report.schema.json",
              "reasoning-project-verification.schema.json",
              "layered-answer-packet.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 5 tests
        run: |
          python -m unittest \
            tests.test_reasoning_engine \
            tests.test_reasoning_project -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-reason --help >/dev/null
          tkr-reason build --help >/dev/null
          tkr-reason verify --help >/dev/null
          tkr-reason query --help >/dev/null
          python scripts/tkr.py reason --help >/dev/null
          python scripts/tkr.py reason-build --help >/dev/null
          python scripts/tkr.py reason-verify --help >/dev/null
          python scripts/tkr.py reason-query --help >/dev/null
