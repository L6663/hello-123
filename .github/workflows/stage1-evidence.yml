name: Stage 6 Notion CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage6-notion-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 6 CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/notion_engine.py \
            tkr/notion_project.py \
            tkr/notion_cli.py \
            tkr/stage6_notion_r1.py

      - name: Validate Stage 6 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "notion-page.schema.json",
              "notion-relation.schema.json",
              "notion-review-item.schema.json",
              "notion-sync-ledger.schema.json",
              "notion-sync-action.schema.json",
              "notion-workspace-schema.schema.json",
              "notion-project-report.schema.json",
              "notion-project-manifest.schema.json",
              "notion-project-verification.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 6 tests
        run: |
          python -m unittest \
            tests.test_notion_engine \
            tests.test_notion_project \
            tests.test_notion_stage6_r1 -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-notion --help >/dev/null
          tkr-notion build --help >/dev/null
          tkr-notion verify --help >/dev/null
          tkr-notion plan --help >/dev/null
          python scripts/tkr.py notion --help >/dev/null
          python scripts/tkr.py notion-build --help >/dev/null
          python scripts/tkr.py notion-verify --help >/dev/null
          python scripts/tkr.py notion-plan --help >/dev/null
