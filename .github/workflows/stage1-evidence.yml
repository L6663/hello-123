name: Stage 5 Reasoning CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage5-reasoning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 5 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply staged direct-fact lineage refinement
        if: ${{ hashFiles('.stage5/apply_reasoning_contract_refinement.py') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python .stage5/apply_reasoning_contract_refinement.py
          python -m py_compile tkr/reasoning_engine.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/reasoning_engine.py
          git rm .stage5/apply_reasoning_contract_refinement.py
          rmdir .stage5 2>/dev/null || true
          git commit -m "refactor(stage5): require chapter and independence lineage for facts"
          git push origin "HEAD:${{ github.head_ref }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: python -m py_compile tkr/reasoning_engine.py

      - name: Stage 5 tests
        run: python -m unittest tests.test_reasoning_engine -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'
