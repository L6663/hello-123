name: Stage 4 Character CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage4-character-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 4 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/character_engine.py \
            tkr/character_project.py \
            tkr/character_cli.py

      - name: Validate Stage 4 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "focused-character.schema.json",
              "character-attribute.schema.json",
              "character-state.schema.json",
              "character-relationship.schema.json",
              "character-event-link.schema.json",
              "character-annotation.schema.json",
              "character-project-report.schema.json",
              "character-project-verification.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 4 tests
        id: stage4_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m unittest \
            tests.test_character_engine \
            tests.test_character_project -v 2>&1 | tee stage4-tests.log

      - name: Upload failed Stage 4 log
        if: ${{ steps.stage4_tests.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: stage4-test-diagnostics
          path: stage4-tests.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop after failed Stage 4 tests
        if: ${{ steps.stage4_tests.outcome == 'failure' }}
        run: exit 1

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-character --help >/dev/null
          tkr-character build --help >/dev/null
          tkr-character verify --help >/dev/null
          tkr-character query --help >/dev/null
          python scripts/tkr.py character --help >/dev/null
          python scripts/tkr.py character-build --help >/dev/null
          python scripts/tkr.py character-verify --help >/dev/null
          python scripts/tkr.py character-query --help >/dev/null
