name: Stage 7 Literary Benchmark CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage7-literary-benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 7 CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/literary_benchmark.py \
            tkr/literary_benchmark_cli.py

      - name: Validate Stage 7 schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "literary-benchmark-case.schema.json",
              "literary-benchmark-observation.schema.json",
              "literary-benchmark-report.schema.json",
              "literary-benchmark-verification.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Stage 7 tests
        run: python -m unittest tests.test_literary_benchmark -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: CLI smoke check
        run: |
          tkr-literary-benchmark --help >/dev/null
          tkr-literary-benchmark evaluate --help >/dev/null
          tkr-literary-benchmark verify --help >/dev/null
          python scripts/tkr.py benchmark --help >/dev/null
          python scripts/tkr.py benchmark-evaluate --help >/dev/null
          python scripts/tkr.py benchmark-verify --help >/dev/null
