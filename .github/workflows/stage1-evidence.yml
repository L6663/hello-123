name: Stage 5 Reasoning CI

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
  workflow_dispatch:

concurrency:
  group: stage5-reasoning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify:
    name: Stage 5 CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Compile
        run: |
          python -m py_compile \
            tkr/reasoning_engine.py \
            tkr/reasoning_project.py \
            tkr/reasoning_cli.py

      - name: Stage 5 tests
        run: python -m unittest tests.test_reasoning_engine -v

      - name: Repository regression
        run: python -m unittest discover -s tests -p 'test_*.py'
