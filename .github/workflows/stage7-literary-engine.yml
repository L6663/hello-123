name: Stage 7 literary knowledge engine checks

on:
  pull_request:
    branches:
      - develop/v6-literary-engine
    paths:
      - "tkr/literary_*.py"
      - "scripts/tkr.py"
      - "tests/test_literary_engine.py"
      - "schemas/literary-*.schema.json"
      - "docs/STAGE7_LITERARY_ENGINE.md"
      - "pyproject.toml"
      - "MANIFEST.in"
      - "PROJECT_STATUS.yaml"
      - "SKILL.md"
      - ".github/workflows/stage7-literary-engine.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  stage7-literary:
    name: Stage 7 literary / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development candidate
        run: python -m pip install .

      - name: Compile literary runtime and bundled entrypoint
        run: |
          python -m py_compile \
            scripts/tkr.py \
            tkr/literary_models.py \
            tkr/literary_engine.py \
            tkr/literary_query.py \
            tkr/literary_export.py \
            tkr/literary_cli.py

      - name: Validate literary schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          names = [
              "literary-annotation.schema.json",
              "literary-report.schema.json",
              "literary-query-packet.schema.json",
              "literary-evidence-anchor.schema.json",
              "literary-assertion.schema.json",
              "literary-entity.schema.json",
              "literary-relationship.schema.json",
              "literary-event.schema.json",
          ]
          for name in names:
              payload = json.loads((Path("schemas") / name).read_text(encoding="utf-8"))
              assert payload["$schema"].endswith("2020-12/schema")
              assert payload["type"] == "object"
          PY

      - name: Run Stage 7 focused regression
        id: focused
        shell: bash
        run: |
          set -o pipefail
          python -m unittest tests.test_literary_engine -v 2>&1 | tee /tmp/stage7-focused-${{ matrix.python-version }}.log

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7-focused-${{ matrix.python-version }}
          path: /tmp/stage7-focused-${{ matrix.python-version }}.log
          retention-days: 3

      - name: Run repository regression
        id: repository
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_*.py' -v 2>&1 | tee /tmp/stage7-repository-${{ matrix.python-version }}.log

      - name: Upload repository diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage7-repository-${{ matrix.python-version }}
          path: /tmp/stage7-repository-${{ matrix.python-version }}.log
          retention-days: 3

      - name: Exercise installed and bundled CLI surfaces
        run: |
          tkr-literary --help
          tkr-literary build --help
          tkr-literary verify --help
          tkr-literary query --help
          tkr-literary export-notion --help
          python scripts/tkr.py --help
          python scripts/tkr.py literary --help
          python scripts/tkr.py literary-build --help
          python scripts/tkr.py literary-verify --help
          python scripts/tkr.py literary-query --help
          python scripts/tkr.py literary-export-notion --help

      - name: Assert development-only governance
        run: |
          python - <<'PY'
          from pathlib import Path
          from tkr import __version__

          assert __version__ == "6.0.0-alpha1"
          assert "alpha" in __version__
          skill = Path("SKILL.md").read_text(encoding="utf-8")
          assert "no v6 final acceptance or freeze" in skill
          assert "Do not silently promote C to B or B to A" in skill
          PY
