name: Stage 6 Fixture Bootstrap

on:
  push:
    branches:
      - feature/v6-stage6-notion-knowledge-system
  workflow_dispatch:

concurrency:
  group: stage6-fixture-bootstrap
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v6-stage6-notion-knowledge-system
          fetch-depth: 0

      - name: Apply self-contained Stage 6 fixtures
        shell: bash
        run: |
          set -euo pipefail
          test -f .stage6/bootstrap_fix_tests.py
          python .stage6/bootstrap_fix_tests.py
          python -m py_compile tests/test_notion_engine.py tests/test_notion_project.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_notion_engine.py tests/test_notion_project.py
          git rm .stage6/bootstrap_fix_tests.py .github/workflows/stage6-bootstrap-fix.yml
          rmdir .stage6 2>/dev/null || true
          git commit -m "test(stage6): isolate Notion fixtures and direct hash tampering"
          git push origin HEAD:feature/v6-stage6-notion-knowledge-system
