name: phase5-date-refinement-fix

on:
  push:
    branches:
      - feature/hybrid-retrieval-v5.5-alpha1

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply compatible date refinement fix
        shell: bash
        run: |
          set -euo pipefail
          test -f .phase5-date-refinement-fix.py
          python .phase5-date-refinement-fix.py
          python -m pip install .
          python -m compileall -q tkr tests
          python -m unittest discover -s tests -v
      - name: Commit validated review fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/hybrid_retrieval.py tests/test_hybrid_retrieval.py
          git rm .phase5-date-refinement-fix.py
          git rm .github/workflows/phase5-date-refinement-fix.yml
          git commit -m "fix(retrieval): select precise compatible dates"
          git push origin HEAD:feature/hybrid-retrieval-v5.5-alpha1
