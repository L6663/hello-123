name: entity-normalization-ci

on:
  push:
    branches:
      - feature/entity-normalization-v5.4-alpha1
  pull_request:
    paths:
      - "tkr/entity_normalization.py"
      - "tkr/entity_cli.py"
      - "tests/test_entity_normalization*.py"
      - "pyproject.toml"
      - ".github/workflows/entity-normalization-ci.yml"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.materialize.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/entity-normalization-v5.4-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Materialize and validate Phase 4 payload
        id: materialize
        shell: bash
        run: |
          set +e
          if [ ! -f .phase4-upload/repair.b64 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "status=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          (
            set -euo pipefail
            cat .phase4-upload/entity/part* | tr -d '\n\r' | base64 -d > tkr/entity_normalization.py
            cat .phase4-upload/tests/part* | tr -d '\n\r' | base64 -d > tests/test_entity_normalization_adversarial.py
            tr -d '\n\r' < .phase4-upload/repair.b64 | base64 -d > /tmp/phase4_repair.py
            sha256sum /tmp/phase4_repair.py
            echo "d1fe1c33a7cc704dfb2c2d34154f18051dc3814db9b4c9af2380583c8cad7a4d  /tmp/phase4_repair.py" | sha256sum -c -
            python /tmp/phase4_repair.py
            sha256sum tkr/entity_normalization.py tests/test_entity_normalization_adversarial.py
            echo "816f6957735d2f431e113f32106f851df851b78429a4f7ee563bffef9073113c  tkr/entity_normalization.py" | sha256sum -c -
            echo "b4fe014e5e1507449d13ca0dd32e877b5817738114c3b444d0f99e23409d2b52  tests/test_entity_normalization_adversarial.py" | sha256sum -c -
            python -m pip install .
            python -m compileall -q tkr tests
            python -m unittest discover -s tests -v
          ) > phase4-entity-materialize.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "changed=false" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve materialization log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-entity-materialize-log
          path: phase4-entity-materialize.log
          if-no-files-found: ignore
      - name: Report materialization failure
        if: steps.materialize.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Phase 4 entity materialization failure'
            echo
            echo '```text'
            cat phase4-entity-materialize.log
            echo '```'
          } > phase4-entity-materialize-comment.md
          gh pr comment 3 --body-file phase4-entity-materialize-comment.md
      - name: Commit materialized implementation
        if: steps.materialize.outputs.status == '0' && hashFiles('.phase4-upload/repair.b64') != ''
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/entity_normalization.py tests/test_entity_normalization_adversarial.py
          git rm -r .phase4-upload
          git rm -f .github/workflows/phase4-materialize.yml
          git commit -m "feat(entities): harden Phase 4 normalization and adversarial tests"
          git push origin HEAD:feature/entity-normalization-v5.4-alpha1
      - name: Enforce materialization gate
        if: always()
        run: test "${{ steps.materialize.outputs.status }}" = "0"

  test:
    needs: materialize
    if: needs.materialize.outputs.changed != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/entity-normalization-v5.4-alpha1
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Run compile and Phase 4 tests
        id: validation
        shell: bash
        run: |
          set +e
          python -m compileall -q tkr tests > entity-compile.log 2>&1
          compile_exit=$?
          if [ "$compile_exit" -eq 0 ]; then
            python -m unittest discover -s tests -p 'test_entity_normalization*.py' -v > entity-tests.log 2>&1
            test_exit=$?
          else
            : > entity-tests.log
            test_exit=99
          fi
          echo "compile_exit=$compile_exit" >> "$GITHUB_OUTPUT"
          echo "test_exit=$test_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve validation logs and source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entity-normalization-python-${{ matrix.python-version }}
          path: |
            entity-compile.log
            entity-tests.log
            tkr/
            tests/
            pyproject.toml
            README.md
          if-no-files-found: error
      - name: Report Python 3.11 failure
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11' && (steps.validation.outputs.compile_exit != '0' || steps.validation.outputs.test_exit != '0')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Phase 4 CI failure (Python 3.11)'
            echo
            echo '#### compile'
            echo '```text'
            cat entity-compile.log
            echo '```'
            echo
            echo '#### tests'
            echo '```text'
            cat entity-tests.log
            echo '```'
          } > entity-ci-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file entity-ci-comment.md
      - name: Enforce validation gate
        if: always()
        run: |
          test "${{ steps.validation.outputs.compile_exit }}" = "0"
          test "${{ steps.validation.outputs.test_exit }}" = "0"
