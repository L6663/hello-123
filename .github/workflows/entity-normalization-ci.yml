name: entity-normalization-ci

on:
  push:
    branches:
      - feature/entity-normalization-v5.4-alpha1
  pull_request:
    branches:
      - main
    paths:
      - "tkr/entity_normalization.py"
      - "tkr/entity_cli.py"
      - "tests/test_entity_normalization*.py"
      - "pyproject.toml"
      - ".github/workflows/entity-normalization-ci.yml"
      - ".phase4-review-fix.patch"

permissions:
  contents: write
  pull-requests: write

jobs:
  apply_review_fix:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.apply.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply reviewed Phase 4 correction
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .phase4-review-fix.patch ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git apply --check .phase4-review-fix.patch
          git apply .phase4-review-fix.patch
          python -m pip install .
          python -m compileall -q tkr tests
          python -m unittest discover -s tests -v
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/entity_normalization.py tests/test_entity_normalization_adversarial.py
          git rm .phase4-review-fix.patch
          git commit -m "fix(entities): require evidence for every temporal transition"
          git push origin HEAD:feature/entity-normalization-v5.4-alpha1
          echo "changed=true" >> "$GITHUB_OUTPUT"

  test:
    needs: apply_review_fix
    if: always() && (github.event_name == 'pull_request' || (needs.apply_review_fix.result == 'success' && needs.apply_review_fix.outputs.changed != 'true'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Run compile and Phase 4 tests
        id: validation
        shell: bash
        run: |
          set +e
          python -m compileall -q tkr tests > entity-compile.log 2>&1
          compile_exit=$?
          if [ "$compile_exit" -eq 0 ]; then
            python -m unittest discover -s tests -p 'test_entity_normalization*.py' -v > entity-tests.log 2>&1
            test_exit=$?
          else
            : > entity-tests.log
            test_exit=99
          fi
          echo "compile_exit=$compile_exit" >> "$GITHUB_OUTPUT"
          echo "test_exit=$test_exit" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve validation logs and source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entity-normalization-python-${{ matrix.python-version }}
          path: |
            entity-compile.log
            entity-tests.log
            tkr/
            tests/
            pyproject.toml
            README.md
          if-no-files-found: error
      - name: Report Python 3.11 failure
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11' && (steps.validation.outputs.compile_exit != '0' || steps.validation.outputs.test_exit != '0')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '### Phase 4 CI failure (Python 3.11)'
            echo
            echo '#### compile'
            echo '```text'
            cat entity-compile.log
            echo '```'
            echo
            echo '#### tests'
            echo '```text'
            cat entity-tests.log
            echo '```'
          } > phase4-ci-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file phase4-ci-comment.md
      - name: Enforce validation gate
        if: always()
        run: |
          test "${{ steps.validation.outputs.compile_exit }}" = "0"
          test "${{ steps.validation.outputs.test_exit }}" = "0"
