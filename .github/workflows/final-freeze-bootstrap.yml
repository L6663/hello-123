name: Final freeze one-time bootstrap

on:
  pull_request:
    branches:
      - feature/phase9-0-baseline-cleanup
    paths:
      - ".final-freeze/**"
      - ".github/workflows/final-freeze-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-final-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and verify patch
        id: reconstruct
        shell: bash
        run: |
          set -o pipefail
          {
            set -eux
            wc -c .final-freeze/chunk-*
            cat .final-freeze/chunk-* > /tmp/final-freeze.patch.gz.b64
            wc -c /tmp/final-freeze.patch.gz.b64
            sha256sum /tmp/final-freeze.patch.gz.b64
            test "$(sha256sum /tmp/final-freeze.patch.gz.b64 | cut -d' ' -f1)" = "6b6a1d5ac4dfed134fd26a5c7cfdcb2b853f6f327eb855c2f20196957cff71d1"
            base64 --decode /tmp/final-freeze.patch.gz.b64 > /tmp/final-freeze.patch.gz
            sha256sum /tmp/final-freeze.patch.gz
            test "$(sha256sum /tmp/final-freeze.patch.gz | cut -d' ' -f1)" = "8e4843babed3962fda4aef214687ced726b7ed72e23b035d0f5176b7a40df54f"
            gzip --decompress --stdout /tmp/final-freeze.patch.gz > /tmp/final-freeze.patch
            sha256sum /tmp/final-freeze.patch
            test "$(sha256sum /tmp/final-freeze.patch | cut -d' ' -f1)" = "3cc9a3a4421e497f9ddec70896aa7a57f429f900e265d3b409b449c055546ea6"
            git apply --check --recount --verbose /tmp/final-freeze.patch
            git apply --recount --verbose /tmp/final-freeze.patch
          } 2>&1 | tee /tmp/final-freeze-bootstrap.log

      - name: Upload bootstrap diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-freeze-bootstrap-diagnostics
          path: /tmp/final-freeze-bootstrap.log
          retention-days: 3

      - name: Commit final Skill tree
        if: steps.reconstruct.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          # Workflow files and one-time transfer files are finalized separately
          # through the connected GitHub authority after this source commit.
          rm -f .github/workflows/final-freeze.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            FREEZE_MANIFEST.json \
            MANIFEST.in \
            PROJECT_STATUS.yaml \
            README.md \
            SKILL.md \
            acceptance/final-freeze-summary.json \
            docs/final-freeze-v5.9.0.md \
            pyproject.toml \
            schemas \
            scripts \
            tests \
            tkr
          git commit -m "release: assemble Text Knowledge Reader v5.9.0 final freeze"
          git push origin "HEAD:${{ github.head_ref }}"
