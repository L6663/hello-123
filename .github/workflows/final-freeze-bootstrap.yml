name: Final freeze one-time bootstrap

on:
  push:
    branches:
      - release/v5.9.0-final-freeze
    paths:
      - ".final-freeze/**"
      - ".github/workflows/final-freeze-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-final-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v5.9.0-final-freeze
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .final-freeze/chunk-* > /tmp/final-freeze.patch.gz.b64
          base64 --decode /tmp/final-freeze.patch.gz.b64 > /tmp/final-freeze.patch.gz
          gzip --decompress --stdout /tmp/final-freeze.patch.gz > /tmp/final-freeze.patch
          git apply --check --recount /tmp/final-freeze.patch
          git apply --recount /tmp/final-freeze.patch

      - name: Commit final Skill tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .final-freeze .github/workflows/final-freeze-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: assemble Text Knowledge Reader v5.9.0 final freeze"
          git push origin HEAD:release/v5.9.0-final-freeze
