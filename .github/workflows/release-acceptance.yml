name: release-acceptance
on:
  push:
    branches:
      - main
      - "release/**"
      - "feature/release-freeze-v5.8-alpha1"
  pull_request:
    branches:
      - main
permissions:
  contents: read
env:
  SOURCE_DATE_EPOCH: "1700000000"
jobs:
  package-and-benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Audit wheel before installation with checkout policy
        shell: bash
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/*.whl)
          python tools/preinstall_wheel_audit.py "$WHEEL"
      - name: Install wheel into an isolated environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .release-venv
          .release-venv/bin/python -m pip install --upgrade pip
          WHEEL=$(ls dist/*.whl)
          .release-venv/bin/python -m pip install "$WHEEL"
          .release-venv/bin/python -m pip check
      - name: Verify installed console scripts
        shell: bash
        run: |
          set -euo pipefail
          for command in \
            tkr-chunk \
            tkr-claim-validate \
            tkr-entity-normalize \
            tkr-retrieval \
            tkr-strict-qa \
            tkr-gold-benchmark \
            tkr-release-freeze
          do
            ".release-venv/bin/$command" --help >/dev/null
          done
      - name: Audit wheel contents and installed footprint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "release-artifacts/python-${{ matrix.python-version }}"
          WHEEL=$(realpath $(ls dist/*.whl))
          cd /tmp
          "$GITHUB_WORKSPACE/.release-venv/bin/python" \
            "$GITHUB_WORKSPACE/tools/package_acceptance.py" \
            --wheel "$WHEEL" \
            --output "$GITHUB_WORKSPACE/release-artifacts/python-${{ matrix.python-version }}/package-acceptance.json"
          "$GITHUB_WORKSPACE/.release-venv/bin/python" -m pip freeze \
            > "$GITHUB_WORKSPACE/release-artifacts/python-${{ matrix.python-version }}/installed-packages.txt"
      - name: Run the 108-case Release Gold gate from the installed wheel
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp
          "$GITHUB_WORKSPACE/.release-venv/bin/python" \
            "$GITHUB_WORKSPACE/benchmark/release_benchmark.py" \
            --output "$GITHUB_WORKSPACE/release-artifacts/python-${{ matrix.python-version }}/benchmark" \
            2>&1 | tee "$GITHUB_WORKSPACE/release-artifacts/python-${{ matrix.python-version }}/benchmark-run.log"
      - name: Assert release authority and non-freeze boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          import os
          root = Path(os.environ["GITHUB_WORKSPACE"]) / "release-artifacts" / "python-${{ matrix.python-version }}" / "benchmark"
          package = json.loads((root.parent / "package-acceptance.json").read_text(encoding="utf-8"))
          report = json.loads((root / "release-report.json").read_text(encoding="utf-8"))
          verification = json.loads((root / "release-verification.json").read_text(encoding="utf-8"))
          manifest = json.loads((root / "release-manifest.json").read_text(encoding="utf-8"))
          assert package["accepted"] is True
          assert package["verifier_origin"] == "reviewed_checkout"
          assert package["installable_payload_violations"] == []
          assert report["passed"] is True
          assert report["may_certify_release"] is True
          assert report["may_freeze"] is False
          assert verification["accepted"] is True
          assert manifest["case_count"] == 108
          assert manifest["governance"]["may_freeze"] is False
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tkr-v5.8.0-alpha1-python-${{ matrix.python-version }}
          path: |
            dist/*
            release-artifacts/python-${{ matrix.python-version }}/
          if-no-files-found: error

  freeze-candidate:
    needs: package-and-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          pattern: tkr-v5.8.0-alpha1-python-*
          path: matrix-artifacts
      - name: Build the wheel twice with a fixed epoch
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir reproducible-a
          rm -rf build *.egg-info
          python -m build --wheel --outdir reproducible-b
          sha256sum reproducible-a/*.whl reproducible-b/*.whl
      - name: Audit reproducible wheels before installation
        shell: bash
        run: |
          set -euo pipefail
          python tools/preinstall_wheel_audit.py reproducible-a/*.whl
          python tools/preinstall_wheel_audit.py reproducible-b/*.whl
      - name: Install one reproducible wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .freeze-venv
          .freeze-venv/bin/python -m pip install --upgrade pip
          .freeze-venv/bin/python -m pip install reproducible-a/*.whl
          .freeze-venv/bin/python -m pip check
      - name: Assemble and verify with checkout code
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_COMMIT="${{ github.event.pull_request.head.sha || github.sha }}"
          python tools/assemble_freeze_candidate.py \
            --matrix-root matrix-artifacts \
            --source-root "$GITHUB_WORKSPACE" \
            --reproducible-wheel reproducible-a/*.whl \
            --reproducible-wheel reproducible-b/*.whl \
            --output-root freeze-candidate \
            --release-version 5.8.0a1 \
            --source-commit "$SOURCE_COMMIT" \
            --source-date-epoch "$SOURCE_DATE_EPOCH"
      - name: Assert candidate cannot self-authorize
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          candidate = json.loads(Path("freeze-candidate/freeze-candidate.json").read_text())
          verification = json.loads(Path("freeze-candidate/freeze-candidate-verification.json").read_text())
          assert candidate["technical_gate_passed"] is True
          assert candidate["requires_explicit_approval"] is True
          assert candidate["may_freeze"] is False
          assert candidate["evidence"]["source_provenance_verified"] is True
          assert verification["accepted"] is True
          assert verification["may_freeze"] is False
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: tkr-v5.8.0-alpha1-freeze-candidate
          path: |
            freeze-candidate/
            reproducible-a/*.whl
            reproducible-b/*.whl
          if-no-files-found: error
