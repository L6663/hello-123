name: phase7-review-fix
on:
  pull_request:
    paths:
      - "tools/apply_phase7_review_fix.py"
      - ".github/workflows/phase7-review-fix.yml"
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/gold-benchmark-v5.7-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/apply_phase7_review_fix.py
      - run: python -m pip install .
      - run: python -m compileall -q tkr tests
      - name: Capture regression output
        id: regression
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -q > phase7-review-fix.log 2>&1
          code=$?
          PYTHONPATH=tests python - <<'PY' >> phase7-review-fix.log 2>&1
          from pathlib import Path
          import tempfile
          from test_gold_benchmark import GoldBenchmarkFixture
          from tkr.gold_benchmark import evaluate_gold_benchmark

          fixture = GoldBenchmarkFixture()
          with tempfile.TemporaryDirectory() as directory:
              paths, gold, _ = fixture.make_benchmark(Path(directory))
              report = evaluate_gold_benchmark(paths[4], gold, profile="smoke")
              print("HARD_NEGATIVE_DIAGNOSTIC")
              for case in report.cases:
                  failures = [
                      code for code in case.reason_codes
                      if code.startswith("HARD_NEGATIVE_EVIDENCE_NOT_ESTABLISHED:")
                  ]
                  if failures:
                      print(case.case_id, case.actual_decision, failures)
          PY
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: phase7-review-fix-log
          path: phase7-review-fix.log
      - name: Stop on test failure
        if: steps.regression.outputs.exit_code != '0'
        run: exit ${{ steps.regression.outputs.exit_code }}
      - name: Commit review fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/gold_benchmark.py tkr/gold_hard_negatives.py tests/test_gold_benchmark.py tests/test_gold_benchmark_adversarial.py
          git rm tools/apply_phase7_review_fix.py
          git commit -m "fix(benchmark): ground hard-negative coverage in indexed evidence"
          git push origin HEAD:feature/gold-benchmark-v5.7-alpha1
