name: claim-validation-ci

on:
  push:
    branches:
      - feature/claim-validation-v5.3-alpha1
  pull_request:
    paths:
      - "tkr/claim_validation.py"
      - "tkr/claim_cli.py"
      - "tests/test_claim_validation.py"
      - "pyproject.toml"
      - ".github/workflows/claim-validation-ci.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Compile sources
        id: compile
        continue-on-error: true
        run: python -m compileall -q tkr tests > claim-compile.log 2>&1
      - name: Run typed Claim tests
        id: tests
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        run: python -m unittest tests.test_claim_validation -v > claim-tests.log 2>&1
      - name: Preserve validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claim-validation-python-${{ matrix.python-version }}
          path: |
            claim-compile.log
            claim-tests.log
          if-no-files-found: ignore
      - name: Report Python 3.11 failure
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11' && (steps.compile.outcome == 'failure' || steps.tests.outcome == 'failure')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Phase 3 CI failure (Python 3.11)'
            echo
            echo '#### compile'
            echo '```text'
            cat claim-compile.log 2>/dev/null || true
            echo '```'
            echo
            echo '#### tests'
            echo '```text'
            cat claim-tests.log 2>/dev/null || true
            echo '```'
          } > claim-ci-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file claim-ci-comment.md
      - name: Enforce validation gate
        if: always()
        run: |
          test "${{ steps.compile.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
