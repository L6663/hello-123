name: phase7-policy-pass-fix
on:
  pull_request:
    paths:
      - ".github/workflows/phase7-policy-pass-fix.yml"
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/gold-benchmark-v5.7-alpha1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Rewrite benchmark verifier
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tkr/gold_benchmark.py")
          text = path.read_text(encoding="utf-8")
          old = '''    unique = tuple(dict.fromkeys(reasons))
              if unique:
                  return BenchmarkVerification("rejected", False, unique, supplied_id, expected.report_id)
              return BenchmarkVerification(
                  "accepted",
                  True,
                  ("BENCHMARK_RECOMPUTED_EXACTLY", "IMMUTABLE_POLICY_CONFIRMED"),
                  supplied_id,
                  expected.report_id,
              )
          '''
          new = '''    unique = tuple(dict.fromkeys(reasons))
              if unique:
                  return BenchmarkVerification("rejected", False, unique, supplied_id, expected.report_id)
              if not expected.passed:
                  return BenchmarkVerification(
                      "rejected",
                      False,
                      ("BENCHMARK_RECOMPUTED_EXACTLY", "BENCHMARK_POLICY_NOT_PASSED"),
                      supplied_id,
                      expected.report_id,
                  )
              return BenchmarkVerification(
                  "accepted",
                  True,
                  ("BENCHMARK_RECOMPUTED_EXACTLY", "IMMUTABLE_POLICY_CONFIRMED"),
                  supplied_id,
                  expected.report_id,
              )
          '''
          old = old.replace("              ", "")
          new = new.replace("              ", "")
          if text.count(old) != 1:
              raise SystemExit(f"verification marker count is {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - run: python -m pip install .
      - run: python -m compileall -q tkr tests
      - run: python -m unittest discover -s tests -q
      - name: Commit verified policy gate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tkr/gold_benchmark.py
          git commit -m "fix(benchmark): reject reports that fail their policy"
          git push origin HEAD:feature/gold-benchmark-v5.7-alpha1
