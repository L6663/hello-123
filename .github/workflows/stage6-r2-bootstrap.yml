name: Stage 6 R2 one-time remediation bootstrap

on:
  pull_request:
    branches:
      - feature/phase9-0-baseline-cleanup
    paths:
      - ".stage6/r2-remediation.patch"
      - ".github/workflows/stage6-r2-bootstrap.yml"

permissions:
  contents: write

jobs:
  apply-r2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Diagnose and apply patch
        id: apply
        shell: bash
        run: |
          set -o pipefail
          {
            echo "HEAD=$(git rev-parse HEAD)"
            git status --short
            git apply --check --verbose .stage6/r2-remediation.patch
            git apply --verbose .stage6/r2-remediation.patch
          } 2>&1 | tee /tmp/r2-apply.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage6-r2-patch-diagnostics
          path: /tmp/r2-apply.log
          retention-days: 3
      - name: Commit applied remediation
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .stage6/r2-remediation.patch .github/workflows/stage6-r2-bootstrap.yml
          rmdir .stage6 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(stage6): generalize R2 anomaly and heading remediation"
          git push origin "HEAD:${{ github.head_ref }}"
