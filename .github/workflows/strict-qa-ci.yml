name: strict-qa-ci

on:
  push:
    branches:
      - feature/strict-qa-v5.6-alpha1
  pull_request:
    paths:
      - "tkr/strict_qa.py"
      - "tkr/strict_qa_cli.py"
      - "tests/test_strict_qa*.py"
      - "tkr/hybrid_retrieval.py"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/strict-qa-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install .
      - name: Compile sources
        run: python -m compileall -q tkr tests
      - name: Run complete regression and adversarial suite
        run: python -m unittest discover -s tests -v
