[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "text-knowledge-reader-core"
version = "5.3.0a1"
description = "Auditable deterministic chunking and typed Claim validation for Text Knowledge Reader"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Text Knowledge Reader project"}]
dependencies = []

[project.scripts]
tkr-chunk = "tkr.cli:main"
tkr-claim-validate = "tkr.claim_cli:main"

[tool.setuptools.packages.find]
include = ["tkr*"]
