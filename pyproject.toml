[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "text-knowledge-reader-core"
version = "5.9.0a1"
description = "Auditable staged text ingestion, typed evidence validation, strict QA, and approval-gated release freezing"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Text Knowledge Reader project"}]
dependencies = []

[project.scripts]
tkr-chunk = "tkr.cli:main"
tkr-claim-validate = "tkr.claim_cli:main"
tkr-entity-normalize = "tkr.entity_cli:main"
tkr-retrieval = "tkr.retrieval_cli:main"
tkr-strict-qa = "tkr.strict_qa_cli:main"
tkr-gold-benchmark = "tkr.gold_benchmark_cli:main"
tkr-release-freeze = "tkr.release_freeze_cli:main"
tkr-anomaly-scan = "tkr.anomaly_cli:main"
tkr-structure-index = "tkr.structure_cli:main"
tkr-semantic-extract = "tkr.semantic_cli:main"

[tool.setuptools.packages.find]
include = ["tkr*"]

[tool.setuptools.data-files]
"share/text-knowledge-reader/schemas" = [
  "schemas/anomaly-finding.schema.json",
  "schemas/anomaly-report.schema.json",
  "schemas/heading-candidate.schema.json",
  "schemas/unit-record.schema.json",
  "schemas/structure-finding.schema.json",
  "schemas/structure-report.schema.json",
  "schemas/semantic-candidate.schema.json",
  "schemas/semantic-finding.schema.json",
  "schemas/model-extraction-task.schema.json",
  "schemas/accepted-claim-record.schema.json",
  "schemas/semantic-report.schema.json",
]
